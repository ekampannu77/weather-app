# Server
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/weatherapp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# OpenWeatherMap
owm.api.key=${OWM_API_KEY:your_owm_api_key}
owm.base.url=https://api.openweathermap.org

# Open-Meteo (no key needed)
openmeteo.archive.url=https://archive-api.open-meteo.com/v1/archive

# YouTube
youtube.api.key=${YOUTUBE_API_KEY:your_youtube_api_key}
youtube.base.url=https://www.googleapis.com/youtube/v3

# Google Maps
googlemaps.api.key=${GOOGLE_MAPS_API_KEY:your_google_maps_api_key}
googlemaps.embed.base.url=https://www.google.com/maps/embed/v1

# CORS
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}

# App Info
spring.application.name=WeatherApp
info.app.name=PM Accelerator Weather App
info.app.version=1.0.0
info.app.creator=Esha Kampannu
info.app.description=Full Stack Weather Application built for PM Accelerator AI Engineer Intern Technical Assessment
